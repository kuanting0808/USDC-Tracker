<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>穩定幣流動性監控</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .dashboard { display: flex; flex-direction: column; align-items: center; padding: 20px 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; margin-bottom: 20px; }
        .stat-box { background: #1e293b; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .value { font-size: 1.5rem; font-weight: bold; }
        .usdc-text { color: #38bdf8; }
        .usdt-text { color: #22c55e; }
        
        /* 比例條樣式 */
        .ratio-container { width: 100%; max-width: 600px; margin-bottom: 25px; }
        .ratio-bar { height: 12px; background: #22c55e; border-radius: 6px; overflow: hidden; display: flex; margin-top: 8px; }
        #usdc-fill { height: 100%; background: #38bdf8; transition: width 1s ease; }
        .ratio-labels { display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; color: #94a3b8; }

        #chart-container { width: 100vw; height: 400px; background: #0f172a; }
        .footer { padding: 20px; font-size: 11px; color: #475569; text-align: center; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="stats-grid">
        <div class="stat-box">
            <div class="label">USDC 發行量</div>
            <div id="usdc-val" class="value usdc-text">--</div>
        </div>
        <div class="stat-box">
            <div class="label">USDT 發行量</div>
            <div id="usdt-val" class="value usdt-text">--</div>
        </div>
    </div>

    <div class="ratio-container">
        <div class="ratio-labels">
            <span>USDC 佔比: <span id="usdc-pct">--</span>%</span>
            <span>USDT 佔比: <span id="usdt-pct">--</span>%</span>
        </div>
        <div class="ratio-bar">
            <div id="usdc-fill" style="width: 50%"></div>
        </div>
    </div>
</div>

<div id="chart-container"></div>

<div class="footer">
    顯示過去 120 天數據趨勢 (藍色: USDC, 綠色: USDT)<br>
    <span id="status">數據加載中...</span>
</div>

<script>
    const container = document.getElementById('chart-container');
    const statusEl = document.getElementById('status');

    function toB(num) { return (num / 1e9).toFixed(2) + ' B'; }

    window.onload = function() {
        const chart = LightweightCharts.createChart(container, {
            width: window.innerWidth,
            height: 400,
            layout: { background: { color: '#0f172a' }, textColor: '#94a3b8' },
            grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
            timeScale: { borderColor: '#334155' },
            rightPriceScale: { borderColor: '#334155' }
        });

        // 建立兩條線
        const usdcSeries = chart.addLineSeries({ color: '#38bdf8', lineWidth: 2, priceFormat: { type: 'custom', formatter: v => (v/1e9).toFixed(1)+'B' } });
        const usdtSeries = chart.addLineSeries({ color: '#22c55e', lineWidth: 2, priceFormat: { type: 'custom', formatter: v => (v/1e9).toFixed(1)+'B' } });

        window.addEventListener('resize', () => chart.applyOptions({ width: window.innerWidth }));

        async function fetchData(id) {
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=120`);
            const data = await res.json();
            return data.market_caps.map(i => ({ time: Math.floor(i[0]/1000), value: i[1] }));
        }

        async function init() {
            try {
                const [usdcData, usdtData] = await Promise.all([fetchData('usd-coin'), fetchData('tether')]);

                usdcSeries.setData(usdcData);
                usdtSeries.setData(usdtData);
                chart.timeScale().fitContent();

                const v1 = usdcData[usdcData.length-1].value;
                const v2 = usdtData[usdtData.length-1].value;
                const total = v1 + v2;

                // 更新文字與比例
                document.getElementById('usdc-val').innerText = '$' + toB(v1);
                document.getElementById('usdt-val').innerText = '$' + toB(v2);
                
                const p1 = ((v1/total)*100).toFixed(1);
                const p2 = (100 - p1).toFixed(1);
                
                document.getElementById('usdc-pct').innerText = p1;
                document.getElementById('usdt-pct').innerText = p2;
                document.getElementById('usdc-fill').style.width = p1 + '%';

                statusEl.innerText = "最後更新: " + new Date().toLocaleString();
            } catch (e) {
                statusEl.innerText = "API 限制，請稍後刷新。";
            }
        }

        init();
    };
</script>
</body>
</html>
