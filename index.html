<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USDC 監控</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        .header { text-align: center; margin-bottom: 20px; }
        /* 顯示人類直覺數字的大字體 */
        #current-supply { font-size: 2.5rem; font-weight: bold; color: #38bdf8; margin: 10px 0; }
        #chart-container { width: 100vw; height: 350px; background: #1e1e1e; position: relative; }
        .label { color: #888; font-size: 14px; }
        #msg { font-size: 12px; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="label">USDC 目前發行量</div>
        <div id="current-supply">載入中...</div>
        <div class="label">過去 90 天趨勢</div>
    </div>
</div>

<div id="chart-container"></div>

<div class="container">
    <div id="msg">正在連接數據源...</div>
</div>

<script>
    const supplyEl = document.getElementById('current-supply');
    const msgEl = document.getElementById('msg');
    const container = document.getElementById('chart-container');

    // 人類直覺數字格式化函數 (Billion / Million)
    function formatHumanReadable(num) {
        if (num >= 1e9) {
            return (num / 1e9).toFixed(2) + ' B'; // 十億
        } else if (num >= 1e6) {
            return (num / 1e6).toFixed(2) + ' M'; // 百萬
        }
        return num.toLocaleString();
    }

    window.onload = function() {
        // 初始化圖表，寬度設為當前視窗寬度
        const chart = LightweightCharts.createChart(container, {
            width: window.innerWidth,
            height: 350,
            layout: { background: { color: '#121212' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#222' }, horzLines: { color: '#222' } },
            timeScale: { borderColor: '#333' },
            rightPriceScale: { 
                borderColor: '#333',
                axisLabelVisible: true,
            }
        });

        const areaSeries = chart.addAreaSeries({
            lineColor: '#38bdf8',
            topColor: 'rgba(56, 189, 248, 0.3)',
            bottomColor: 'rgba(56, 189, 248, 0)',
            lineWidth: 2,
        });

        // 核心功能：自動縮放
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: window.innerWidth });
        });

        async function loadData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/usd-coin/market_chart?vs_currency=usd&days=90');
                const data = await response.json();
                
                const formattedData = data.market_caps.map(item => ({
                    time: Math.floor(item[0] / 1000),
                    value: item[1]
                }));

                // 顯示最後一筆數據（當前發行量）
                const latestValue = formattedData[formattedData.length - 1].value;
                supplyEl.innerText = '$ ' + formatHumanReadable(latestValue);

                areaSeries.setData(formattedData);
                chart.timeScale().fitContent();
                msgEl.innerText = "最後更新: " + new Date().toLocaleTimeString();
            } catch (e) {
                msgEl.innerText = "連線失敗，請稍後再試。";
            }
        }

        loadData();
    };
</script>

</body>
</html>
