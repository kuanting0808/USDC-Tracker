<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>穩定幣流動性對照</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .dashboard { padding: 20px 15px; display: flex; flex-direction: column; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 600px; margin-bottom: 15px; }
        .stat-box { background: #1e293b; padding: 12px; border-radius: 10px; text-align: center; border-left: 4px solid #ccc; }
        .usdc-border { border-left-color: #38bdf8; }
        .usdt-border { border-left-color: #22c55e; }
        .label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
        .value { font-size: 1.4rem; font-weight: bold; }
        
        /* 比例條 */
        .ratio-wrapper { width: 100%; max-width: 600px; margin-bottom: 20px; }
        .ratio-bar { height: 8px; background: #22c55e; border-radius: 4px; overflow: hidden; display: flex; margin-top: 6px; }
        #usdc-fill { height: 100%; background: #38bdf8; transition: width 0.8s; }
        .ratio-text { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; }

        #chart-container { width: 100vw; height: 420px; background: #0f172a; }
        .legend { font-size: 12px; display: flex; gap: 15px; margin-top: 10px; color: #94a3b8; }
        .legend span::before { content: '●'; margin-right: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="stats-grid">
        <div class="stat-box usdc-border">
            <div class="label">USDC (左軸)</div>
            <div id="usdc-val" class="value" style="color:#38bdf8">--</div>
        </div>
        <div class="stat-box usdt-border">
            <div class="label">USDT (右軸)</div>
            <div id="usdt-val" class="value" style="color:#22c55e">--</div>
        </div>
    </div>

    <div class="ratio-wrapper">
        <div class="ratio-text">
            <span>USDC: <span id="usdc-pct">--</span>%</span>
            <span>USDT: <span id="usdt-pct">--</span>%</span>
        </div>
        <div class="ratio-bar"><div id="usdc-fill" style="width: 30%"></div></div>
    </div>
</div>

<div id="chart-container"></div>

<div class="dashboard">
    <div class="legend">
        <span style="color:#38bdf8">USDC 趨勢</span>
        <span style="color:#22c55e">USDT 趨勢</span>
    </div>
    <div id="status" style="font-size:10px; color:#475569; margin-top:15px;">數據更新中...</div>
</div>

<script>
    const container = document.getElementById('chart-container');
    const toB = num => (num / 1e9).toFixed(2) + ' B';

    window.onload = function() {
        // 初始化圖表：開啟左邊與右邊的座標軸
        const chart = LightweightCharts.createChart(container, {
            width: window.innerWidth,
            height: 420,
            layout: { background: { color: '#0f172a' }, textColor: '#94a3b8' },
            grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
            leftPriceScale: { visible: true, borderColor: '#334155' },
            rightPriceScale: { visible: true, borderColor: '#334155' },
            timeScale: { borderColor: '#334155' }
        });

        // 建立 USDC 線條，綁定到左軸 (left)
        const usdcSeries = chart.addLineSeries({ 
            color: '#38bdf8', 
            lineWidth: 2, 
            priceScaleId: 'left',
            priceFormat: { type: 'custom', formatter: v => (v/1e9).toFixed(0)+'B' }
        });

        // 建立 USDT 線條，綁定到右軸 (right)
        const usdtSeries = chart.addLineSeries({ 
            color: '#22c55e', 
            lineWidth: 2, 
            priceScaleId: 'right',
            priceFormat: { type: 'custom', formatter: v => (v/1e9).toFixed(0)+'B' }
        });

        window.addEventListener('resize', () => chart.applyOptions({ width: window.innerWidth }));

        async function fetchData(id) {
            const res = await fetch(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=120`);
            const data = await res.json();
            return data.market_caps.map(i => ({ time: Math.floor(i[0]/1000), value: i[1] }));
        }

        async function init() {
            try {
                const [usdcData, usdtData] = await Promise.all([fetchData('usd-coin'), fetchData('tether')]);

                usdcSeries.setData(usdcData);
                usdtSeries.setData(usdtData);
                
                // 自動調整兩邊的縮放比例
                chart.timeScale().fitContent();

                const v1 = usdcData[usdcData.length-1].value;
                const v2 = usdtData[usdtData.length-1].value;
                const total = v1 + v2;

                document.getElementById('usdc-val').innerText = '$' + toB(v1);
                document.getElementById('usdt-val').innerText = '$' + toB(v2);
                
                const p1 = ((v1/total)*100).toFixed(1);
                const p2 = (100 - p1).toFixed(1);
                
                document.getElementById('usdc-pct').innerText = p1;
                document.getElementById('usdt-pct').innerText = p2;
                document.getElementById('usdc-fill').style.width = p1 + '%';

                document.getElementById('status').innerText = "最後更新: " + new Date().toLocaleString();
            } catch (e) {
                document.getElementById('status').innerText = "載入失敗，請稍後再試。";
            }
        }

        init();
    };
</script>
</body>
</html>
